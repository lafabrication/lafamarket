
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LafaMarket</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0a66c2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.logo{
font-size:24px;
font-weight:bold;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.hero{
text-align:center;
padding:50px;
background:white;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:#0a66c2;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#222;
color:white;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<div class="logo">LafaMarket</div>

<nav>
<a href="#">Accueil</a>
<a href="#">Produits</a>
<a href="#">Vendre</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Marketplace Malagasy</h1>
<p>Achetez et vendez facilement en ligne</p>

</section>

<section class="products">

<div class="product">
<img src="https://picsum.photos/200">
<h3>Produit 1</h3>
<p>20 000 Ar</p>
<button>Acheter</button>
</div>

<div class="product">
<img src="https://picsum.photos/201">
<h3>Produit 2</h3>
<p>35 000 Ar</p>
<button>Acheter</button>
</div>

<div class="product">
<img src="https://picsum.photos/202">
<h3>Produit 3</h3>
<p>15 000 Ar</p>
<button>Acheter</button>
</div>

<div class="product">
<img src="https://picsum.photos/203">
<h3>Produit 4</h3>
<p>50 000 Ar</p>
<button>Acheter</button>
</div>

</section>

<footer>

<p>© 2026 LafaMarket - Marketplace Malagasy</p>

</footer>

</body>
</html>
